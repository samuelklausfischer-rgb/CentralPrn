server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip básico para os assets do bundle
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # SPA: qualquer rota desconhecida cai no index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ------------------------------------------------------------------
    # Proxy reverso para a API da Omie.
    # O browser chama /omie-api/<endpoint> (mesma origem → sem CORS) e o
    # nginx encaminha para https://app.omie.com.br/api/v1/<endpoint>.
    # Equivale ao proxy de dev do Vite em vite.config.js.
    # ------------------------------------------------------------------
    location /omie-api/ {
        proxy_pass https://app.omie.com.br/api/v1/;
        proxy_ssl_server_name on;
        proxy_set_header Host app.omie.com.br;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip básico para os assets do bundle
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # config.js é gerado em runtime (variáveis de ambiente) → nunca cachear,
    # senão o browser pode segurar valores antigos após um redeploy.
    location = /config.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires -1;
    }

    # SPA: qualquer rota desconhecida cai no index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ------------------------------------------------------------------
    # Proxy reverso para a API da Omie (substitui o proxy de dev do Vite).
    # O browser chama /omie-api/<endpoint> (mesma origem → sem CORS) e o
    # nginx encaminha para https://app.omie.com.br/api/v1/<endpoint>.
    # Regex + variável forçam resolução em RUNTIME e SOMENTE IPv4.
    # ------------------------------------------------------------------
    location ~ ^/omie-api/(.*)$ {
        # ipv6=off: a rede do container não tem rota IPv6 e a Omie tem registros
        # AAAA → evita "connect() ... Network unreachable".
        # 127.0.0.11 = DNS embutido do Docker (o mesmo de /etc/resolv.conf).
        resolver 127.0.0.11 valid=60s ipv6=off;
        set $omie_upstream "app.omie.com.br";
        proxy_pass https://$omie_upstream/api/v1/$1$is_args$args;

        proxy_ssl_server_name on;
        proxy_ssl_name app.omie.com.br;
        proxy_set_header Host app.omie.com.br;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # A Omie devolve cabeçalhos grandes → evita o erro
        # "upstream sent too big header while reading response header".
        proxy_buffer_size 32k;
        proxy_buffers 8 32k;
        proxy_busy_buffers_size 64k;

        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
